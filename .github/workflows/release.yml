name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # softprops/action-gh-release needs this
  id-token: write  # cosign keyless via GitHub OIDC

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            packages: true
            ext: ""
          # Both darwin arches build on macos-latest (Apple Silicon runner).
          # Cross-compiling darwin/amd64 with CGO=0 is plain
          # `GOARCH=amd64 go build` — avoids the macos-13 Intel runner
          # queue, which we observed holding releases for 30+ minutes.
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            packages: false
            ext: ""
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            packages: false
            ext: ""
          - runner: windows-latest
            goos: windows
            goarch: amd64
            packages: false
            ext: ".exe"
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            packages: false
            ext: ""
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "0"
      VERSION: ${{ github.ref_name }}       # e.g. v0.1.1
      # Strip the leading `v` so binaries report "0.1.0" not "v0.1.0".
      # GOFLAGS lets every go-build invocation pick up the cleaned value.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build binary
        shell: bash
        run: |
          # Strip the leading v so runtime -version reports semver (0.1.1) not the tag (v0.1.1).
          SEMVER="${VERSION#v}"
          mkdir -p "dist/${GOOS}-${GOARCH}"
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/fsc/telepath-core/internal/daemon.Version=${SEMVER}" \
            -o "dist/${GOOS}-${GOARCH}/telepath${{ matrix.ext }}" \
            ./cmd/telepath

      - name: archive
        shell: bash
        run: |
          OUTDIR="dist/${GOOS}-${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            ( cd "${OUTDIR}" && 7z a "../../telepath-${VERSION}-${GOOS}-${GOARCH}.zip" "telepath${{ matrix.ext }}" )
          else
            tar -czf "telepath-${VERSION}-${GOOS}-${GOARCH}.tar.gz" -C "${OUTDIR}" "telepath${{ matrix.ext }}"
          fi

      - name: install nfpm
        if: matrix.packages
        shell: bash
        run: |
          curl -sSL -o /tmp/nfpm.tgz "https://github.com/goreleaser/nfpm/releases/download/v2.46.1/nfpm_2.46.1_Linux_x86_64.tar.gz"
          mkdir -p /tmp/nfpm && tar -xzf /tmp/nfpm.tgz -C /tmp/nfpm
          echo "/tmp/nfpm" >> "$GITHUB_PATH"

      - name: package .deb + .rpm
        if: matrix.packages
        shell: bash
        run: |
          nfpm package --config scripts/nfpm.yaml --packager deb --target ./
          nfpm package --config scripts/nfpm.yaml --packager rpm --target ./

      - name: install syft
        shell: bash
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /tmp/syft-bin v1.16.0

      - name: generate SBOM
        shell: bash
        run: |
          SBOM="telepath-${VERSION}-${GOOS}-${GOARCH}.sbom.json"
          /tmp/syft-bin/syft "dist/${GOOS}-${GOARCH}/telepath${{ matrix.ext }}" \
            -o "cyclonedx-json=${SBOM}"

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            telepath-*.tar.gz
            telepath-*.zip
            telepath*.deb
            telepath*.rpm
            telepath-*.sbom.json
          fail_on_unmatched_files: false

  finalize:
    name: finalize (notes + SHA256SUMS + sigstore)
    needs: build
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}       # e.g. v0.1.1
      # Strip the leading `v` so binaries report "0.1.0" not "v0.1.0".
      # GOFLAGS lets every go-build invocation pick up the cleaned value.
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install git-cliff
        shell: bash
        run: |
          VER=2.9.1
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/v${VER}/git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /tmp
          sudo mv "/tmp/git-cliff-${VER}/git-cliff" /usr/local/bin/git-cliff
          git-cliff --version

      - name: generate release notes
        shell: bash
        run: |
          git-cliff --config cliff.toml --latest --strip header --output release-notes.md
          echo "=== release-notes.md ==="
          cat release-notes.md

      - name: pull release assets
        shell: bash
        run: |
          mkdir -p release
          cd release
          gh release download "${VERSION}" --repo "${GITHUB_REPOSITORY}" --pattern '*' --clobber
          ls -la

      - name: compute SHA256SUMS
        shell: bash
        run: |
          cd release
          sha256sum $(ls | sort) > SHA256SUMS
          cat SHA256SUMS

      - uses: sigstore/cosign-installer@v3

      - name: sign SHA256SUMS
        shell: bash
        run: |
          cd release
          cosign sign-blob --yes SHA256SUMS \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.crt

      - name: attach SHA256SUMS + set release body
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            release/SHA256SUMS
            release/SHA256SUMS.sig
            release/SHA256SUMS.crt
          fail_on_unmatched_files: false
