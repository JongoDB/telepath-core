name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # softprops/action-gh-release needs this
  id-token: write  # cosign keyless via GitHub OIDC

jobs:
  # One job per OS/arch. Each builds its binary, packages, generates an
  # SBOM, and uploads directly to the GitHub Release for this tag.
  # No intermediate actions/upload-artifact step — avoids the org's artifact
  # storage quota entirely, since GitHub Release assets are on a separate
  # (much larger) bucket.
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            packages: true
            ext: ""
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            packages: false
            ext: ""
          - runner: macos-13
            goos: darwin
            goarch: amd64
            packages: false
            ext: ""
          - runner: windows-latest
            goos: windows
            goarch: amd64
            packages: false
            ext: ".exe"
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            packages: false
            ext: ""
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "0"
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build binary
        shell: bash
        run: |
          mkdir -p "dist/${GOOS}-${GOARCH}"
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/fsc/telepath-core/internal/daemon.Version=${VERSION}" \
            -o "dist/${GOOS}-${GOARCH}/telepath${{ matrix.ext }}" \
            ./cmd/telepath

      - name: archive
        shell: bash
        run: |
          OUTDIR="dist/${GOOS}-${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            ( cd "${OUTDIR}" && 7z a "../../telepath-${VERSION}-${GOOS}-${GOARCH}.zip" "telepath${{ matrix.ext }}" )
          else
            tar -czf "telepath-${VERSION}-${GOOS}-${GOARCH}.tar.gz" -C "${OUTDIR}" "telepath${{ matrix.ext }}"
          fi

      - name: install nfpm
        if: matrix.packages
        shell: bash
        run: |
          curl -sSL -o /tmp/nfpm.tgz "https://github.com/goreleaser/nfpm/releases/download/v2.46.1/nfpm_2.46.1_Linux_x86_64.tar.gz"
          mkdir -p /tmp/nfpm && tar -xzf /tmp/nfpm.tgz -C /tmp/nfpm
          echo "/tmp/nfpm" >> "$GITHUB_PATH"

      - name: package .deb + .rpm
        if: matrix.packages
        shell: bash
        run: |
          nfpm package --config scripts/nfpm.yaml --packager deb --target ./
          nfpm package --config scripts/nfpm.yaml --packager rpm --target ./

      - name: install syft
        shell: bash
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /tmp/syft-bin v1.16.0

      - name: generate SBOM
        shell: bash
        run: |
          SBOM="telepath-${VERSION}-${GOOS}-${GOARCH}.sbom.json"
          /tmp/syft-bin/syft "dist/${GOOS}-${GOARCH}/telepath${{ matrix.ext }}" \
            -o "cyclonedx-json=${SBOM}"

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            telepath-*.tar.gz
            telepath-*.zip
            telepath*.deb
            telepath*.rpm
            telepath-*.sbom.json
          fail_on_unmatched_files: false
          generate_release_notes: true

  # Aggregation job: download the release assets that the matrix jobs just
  # pushed, compute SHA256SUMS, sign them with cosign (keyless via OIDC),
  # and attach SHA256SUMS + sig + cert + install scripts to the release.
  finalize:
    name: finalize (SHA256SUMS + sigstore)
    needs: build
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: pull release assets
        shell: bash
        run: |
          mkdir -p release
          cd release
          gh release download "${VERSION}" --repo "${GITHUB_REPOSITORY}" --pattern '*' --clobber
          ls -la

      - name: compute SHA256SUMS (inc. install scripts)
        shell: bash
        run: |
          cp scripts/install.sh release/install.sh
          cp scripts/install.ps1 release/install.ps1
          chmod +x release/install.sh
          cd release
          # Sort to keep output stable across runs.
          sha256sum $(ls | sort) > SHA256SUMS
          cat SHA256SUMS

      - uses: sigstore/cosign-installer@v3

      - name: sign SHA256SUMS
        shell: bash
        run: |
          cd release
          cosign sign-blob --yes SHA256SUMS \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.crt

      - name: attach SHA256SUMS + installers
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/SHA256SUMS
            release/SHA256SUMS.sig
            release/SHA256SUMS.crt
            release/install.sh
            release/install.ps1
          fail_on_unmatched_files: false
